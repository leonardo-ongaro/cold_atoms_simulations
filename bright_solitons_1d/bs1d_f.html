<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Collision of two 1D bright_solitons</title> 

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    
    <script language="javascript">
      function isInternetExplorer() {
        ua = navigator.userAgent;
        return ua.indexOf("MSIE ") > -1 || ua.indexOf("Trident/") > -1;
      }

      function Animation(frames, img_id, slider_id, interval, loop_select_id){
        this.img_id = img_id;
        this.slider_id = slider_id;
        this.loop_select_id = loop_select_id;
        this.interval = interval;
        this.current_frame = 0;
        this.direction = 0;
        this.timer = null;
        this.frames = new Array(frames.length);

        for (var i=0; i<frames.length; i++)
        {
         this.frames[i] = new Image();
         this.frames[i].src = frames[i];
        }
        var slider = document.getElementById(this.slider_id);
        slider.max = this.frames.length - 1;
        if (isInternetExplorer()) {
            slider.setAttribute('onchange', slider.getAttribute('oninput'));
            slider.setAttribute('oninput', null);
        }
        this.set_frame(this.current_frame);
      }

      Animation.prototype.get_loop_state = function(){
        var button_group = document[this.loop_select_id].state;
        for (var i = 0; i < button_group.length; i++) {
            var button = button_group[i];
            if (button.checked) { return button.value; }
        }
        return undefined;
      }

      Animation.prototype.set_frame = function(frame){
        this.current_frame = frame;
        document.getElementById(this.img_id).src = this.frames[this.current_frame].src;
        document.getElementById(this.slider_id).value = this.current_frame;
      }

      Animation.prototype.next_frame = function() { this.set_frame(Math.min(this.frames.length - 1, this.current_frame + 1)); }
      Animation.prototype.previous_frame = function() { this.set_frame(Math.max(0, this.current_frame - 1)); }
      Animation.prototype.first_frame = function() { this.set_frame(0); }
      Animation.prototype.last_frame = function() { this.set_frame(this.frames.length - 1); }
      
      Animation.prototype.slower = function() {
        this.interval /= 0.7;
        if(this.direction > 0){this.play_animation();}
        else if(this.direction < 0){this.reverse_animation();}
      }

      Animation.prototype.faster = function() {
        this.interval *= 0.7;
        if(this.direction > 0){this.play_animation();}
        else if(this.direction < 0){this.reverse_animation();}
      }

      Animation.prototype.anim_step_forward = function() {
        this.current_frame += 1;
        if(this.current_frame < this.frames.length){
          this.set_frame(this.current_frame);
        }else{
          var loop_state = this.get_loop_state();
          if(loop_state == "loop"){ this.first_frame(); }
          else if(loop_state == "reflect"){ this.last_frame(); this.reverse_animation(); }
          else{ this.pause_animation(); this.last_frame(); }
        }
      }

      Animation.prototype.anim_step_reverse = function() {
        this.current_frame -= 1;
        if(this.current_frame >= 0){
          this.set_frame(this.current_frame);
        }else{
          var loop_state = this.get_loop_state();
          if(loop_state == "loop"){ this.last_frame(); }
          else if(loop_state == "reflect"){ this.first_frame(); this.play_animation(); }
          else{ this.pause_animation(); this.first_frame(); }
        }
      }

      Animation.prototype.pause_animation = function() {
        this.direction = 0;
        if (this.timer){ clearInterval(this.timer); this.timer = null; }
      }

      Animation.prototype.play_animation = function() {
        this.pause_animation();
        this.direction = 1;
        var t = this;
        if (!this.timer) this.timer = setInterval(function() { t.anim_step_forward(); }, this.interval);
      }

      Animation.prototype.reverse_animation = function() {
        this.pause_animation();
        this.direction = -1;
        var t = this;
        if (!this.timer) this.timer = setInterval(function() { t.anim_step_reverse(); }, this.interval);
      }
    </script>

    <style>
        .animation { display: inline-block; text-align: center; }
        input[type=range].anim-slider { width: 374px; margin-left: auto; margin-right: auto; }
        .anim-buttons { margin: 8px 0px; }
        .anim-buttons button { padding: 0; width: 36px; }
        .anim-state label { margin-right: 8px; }
        .anim-state input { margin: 0; vertical-align: middle; }
        body { text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="animation">
      <img id="_anim_imgc7d5aeb2049c48bca63c91ac760f4c54">
      <div class="anim-controls">
        <input id="_anim_sliderc7d5aeb2049c48bca63c91ac760f4c54" type="range" class="anim-slider"
               name="points" min="0" max="1" step="1" value="0"
               oninput="animc7d5aeb2049c48bca63c91ac760f4c54.set_frame(parseInt(this.value));">
        <div class="anim-buttons">
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.slower()"><i class="fa fa-minus"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.first_frame()"><i class="fa fa-fast-backward"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.previous_frame()"><i class="fa fa-step-backward"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.reverse_animation()"><i class="fa fa-play fa-flip-horizontal"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.pause_animation()"><i class="fa fa-pause"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.play_animation()"><i class="fa fa-play"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.next_frame()"><i class="fa fa-step-forward"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.last_frame()"><i class="fa fa-fast-forward"></i></button>
          <button onclick="animc7d5aeb2049c48bca63c91ac760f4c54.faster()"><i class="fa fa-plus"></i></button>
        </div>
        <form name="_anim_loop_selectc7d5aeb2049c48bca63c91ac760f4c54" class="anim-state">
          <input type="radio" name="state" value="once" id="_radio1"> <label for="_radio1">Once</label>
          <input type="radio" name="state" value="loop" id="_radio2" checked> <label for="_radio2">Loop</label>
          <input type="radio" name="state" value="reflect" id="_radio3"> <label for="_radio3">Reflect</label>
        </form>
      </div>
    </div>

    <div style="margin-top: 20px;">
        <img src="te_bs1d.jpg" alt="stat" style="max-width: 900px; width: 100%; border: 1px solid #ddd;">
    </div>

    <script language="javascript">
      (function() {
        var img_id = "_anim_imgc7d5aeb2049c48bca63c91ac760f4c54";
        var slider_id = "_anim_sliderc7d5aeb2049c48bca63c91ac760f4c54";
        var loop_select_id = "_anim_loop_selectc7d5aeb2049c48bca63c91ac760f4c54";
        var frames = new Array(50);
        
        for (var i=0; i<50; i++){
          frames[i] = "bs1d_frames/frame" + ("0000000" + i).slice(-7) + ".png";
        }

        setTimeout(function() {
            animc7d5aeb2049c48bca63c91ac760f4c54 = new Animation(frames, img_id, slider_id, 29.0, loop_select_id);
        }, 0);
      })()
    </script>
</body>
</html>
