<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Snaking instability of a 2D dark soliton</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    
    <script language="javascript">
      function isInternetExplorer() {
        var ua = navigator.userAgent;
        return ua.indexOf("MSIE ") > -1 || ua.indexOf("Trident/") > -1;
      }

      /* Definizione della classe Animation */
      function Animation(frames, img_id, slider_id, interval, loop_select_id){
        this.img_id = img_id;
        this.slider_id = slider_id;
        this.loop_select_id = loop_select_id;
        this.interval = interval;
        this.current_frame = 0;
        this.direction = 0;
        this.timer = null;
        this.frames = new Array(frames.length);

        for (var i=0; i<frames.length; i++) {
            this.frames[i] = new Image();
            this.frames[i].src = frames[i];
        }
        var slider = document.getElementById(this.slider_id);
        slider.max = this.frames.length - 1;
        if (isInternetExplorer()) {
            slider.setAttribute('onchange', slider.getAttribute('oninput'));
            slider.setAttribute('oninput', null);
        }
        this.set_frame(this.current_frame);
      }

      Animation.prototype.get_loop_state = function(){
        var button_group = document[this.loop_select_id].state;
        for (var i = 0; i < button_group.length; i++) {
            var button = button_group[i];
            if (button.checked) { return button.value; }
        }
        return undefined;
      }

      Animation.prototype.set_frame = function(frame){
        this.current_frame = frame;
        document.getElementById(this.img_id).src = this.frames[this.current_frame].src;
        document.getElementById(this.slider_id).value = this.current_frame;
      }

      Animation.prototype.next_frame = function() { this.set_frame(Math.min(this.frames.length - 1, this.current_frame + 1)); }
      Animation.prototype.previous_frame = function() { this.set_frame(Math.max(0, this.current_frame - 1)); }
      Animation.prototype.first_frame = function() { this.set_frame(0); }
      Animation.prototype.last_frame = function() { this.set_frame(this.frames.length - 1); }

      Animation.prototype.slower = function() {
        this.interval /= 0.7;
        if(this.direction > 0){this.play_animation();}
        else if(this.direction < 0){this.reverse_animation();}
      }

      Animation.prototype.faster = function() {
        this.interval *= 0.7;
        if(this.direction > 0){this.play_animation();}
        else if(this.direction < 0){this.reverse_animation();}
      }

      Animation.prototype.anim_step_forward = function() {
        this.current_frame += 1;
        if(this.current_frame < this.frames.length){
          this.set_frame(this.current_frame);
        } else {
          var loop_state = this.get_loop_state();
          if(loop_state == "loop"){ this.first_frame(); }
          else if(loop_state == "reflect"){ this.last_frame(); this.reverse_animation(); }
          else { this.pause_animation(); this.last_frame(); }
        }
      }

      Animation.prototype.anim_step_reverse = function() {
        this.current_frame -= 1;
        if(this.current_frame >= 0){
          this.set_frame(this.current_frame);
        } else {
          var loop_state = this.get_loop_state();
          if(loop_state == "loop"){ this.last_frame(); }
          else if(loop_state == "reflect"){ this.first_frame(); this.play_animation(); }
          else { this.pause_animation(); this.first_frame(); }
        }
      }

      Animation.prototype.pause_animation = function() {
        this.direction = 0;
        if (this.timer){ clearInterval(this.timer); this.timer = null; }
      }

      Animation.prototype.play_animation = function() {
        this.pause_animation();
        this.direction = 1;
        var t = this;
        if (!this.timer) this.timer = setInterval(function() { t.anim_step_forward(); }, this.interval);
      }

      Animation.prototype.reverse_animation = function() {
        this.pause_animation();
        this.direction = -1;
        var t = this;
        if (!this.timer) this.timer = setInterval(function() { t.anim_step_reverse(); }, this.interval);
      }
    </script>

    <style>
        body { text-align: center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .animation { display: inline-block; text-align: center; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type=range].anim-slider { width: 374px; margin: 10px auto; display: block; }
        .anim-buttons { margin: 8px 0px; }
        .anim-buttons button { padding: 5px; width: 36px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; }
        .anim-buttons button:hover { background: #eee; }
        .anim-state label { margin-right: 8px; font-size: 14px; }
        .anim-state input { margin: 0; vertical-align: middle; }
        .stat-container { text-align: center; margin-top: 25px; }
        .stat-container img { max-width: 900px; width: 100%; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<div class="animation">
  <img id="_anim_imgbcfbc48320cd4b1e97cf34a1a721280c">
  
  <div class="anim-controls">
    <input id="_anim_sliderbcfbc48320cd4b1e97cf34a1a721280c" type="range" class="anim-slider"
           name="points" min="0" max="1" step="1" value="0"
           oninput="animbcfbc48320cd4b1e97cf34a1a721280c.set_frame(parseInt(this.value));">
    
    <div class="anim-buttons">
      <button title="Rallenta" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.slower()"><i class="fa fa-minus"></i></button>
      <button title="Primo frame" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.first_frame()"><i class="fa fa-fast-backward"></i></button>
      <button title="Frame precedente" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.previous_frame()"><i class="fa fa-step-backward"></i></button>
      <button title="Riproduci all'indietro" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.reverse_animation()"><i class="fa fa-play fa-flip-horizontal"></i></button>
      <button title="Pausa" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.pause_animation()"><i class="fa fa-pause"></i></button>
      <button title="Riproduci" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.play_animation()"><i class="fa fa-play"></i></button>
      <button title="Frame successivo" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.next_frame()"><i class="fa fa-step-forward"></i></button>
      <button title="Ultimo frame" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.last_frame()"><i class="fa fa-fast-forward"></i></button>
      <button title="Accelera" onclick="animbcfbc48320cd4b1e97cf34a1a721280c.faster()"><i class="fa fa-plus"></i></button>
    </div>
    
    <form name="_anim_loop_selectbcfbc48320cd4b1e97cf34a1a721280c" class="anim-state">
      <input type="radio" name="state" value="once" id="_radio1"> <label for="_radio1">Once</label>
      <input type="radio" name="state" value="loop" id="_radio2" checked> <label for="_radio2">Loop</label>
      <input type="radio" name="state" value="reflect" id="_radio3"> <label for="_radio3">Reflect</label>
    </form>
  </div>
</div>

<div class="stat-container">
    <img src="te_ds2d.jpg" alt="statistiche">
</div>

<script language="javascript">
  (function() {
    var img_id = "_anim_imgbcfbc48320cd4b1e97cf34a1a721280c";
    var slider_id = "_anim_sliderbcfbc48320cd4b1e97cf34a1a721280c";
    var loop_select_id = "_anim_loop_selectbcfbc48320cd4b1e97cf34a1a721280c";
    var frames = new Array(100);
    
    for (var i=0; i<100; i++){
      frames[i] = "ds2d_frames/frame" + ("0000000" + i).slice(-7) + ".png";
    }

    setTimeout(function() {
        animbcfbc48320cd4b1e97cf34a1a721280c = new Animation(frames, img_id, slider_id, 200.0, loop_select_id);
    }, 0);
  })()
</script>

</body>
</html>
